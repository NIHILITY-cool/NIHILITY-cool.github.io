<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>听力答案背诵自测</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-logo">L</div>
        <div>
          <h1>听力答案背诵自测</h1>
          <p>按文章记选项内容 · 背诵 / 随机自测</p>
        </div>
      </div>
      <div class="mode-switch" aria-label="模式切换">
        <button id="memorizeBtn" class="mode-btn active">背诵模式</button>
        <button id="testBtn" class="mode-btn">自测模式</button>
      </div>
    </header>

    <main class="study-layout">
      <button id="prevBtn" class="nav-arrow left" title="上一篇">‹</button>

      <section class="study-card">
        <div class="article-hero">
          <div class="article-kicker" id="articleKicker">测试 · 文章</div>
          <h2 id="articleTitle">题目加载中</h2>
          <div class="article-meta">
            <span id="articleRange">第 - 题</span>
            <span id="articleProgress">1 / 1</span>
            <span id="articleCount">0 题</span>
          </div>
          <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
        </div>

        <div class="test-tools" id="testTools">
          <div class="random-note">自测模式会随机抽一篇文章；点击选项内容作答，整篇提交后判分。</div>
          <button id="randomBtn" class="ghost-btn">随机换一篇</button>
        </div>

        <div id="resultPanel" class="result-panel hidden"></div>
        <div id="questionArea" class="question-area"></div>

        <div class="bottom-actions">
          <button id="submitBtn" class="submit-btn hidden">提交本篇</button>
          <button id="retryBtn" class="ghost-btn hidden">重做本篇</button>
          <button id="againBtn" class="ghost-btn hidden">再随机一篇</button>
        </div>
      </section>

      <button id="nextBtn" class="nav-arrow right" title="下一篇">›</button>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
